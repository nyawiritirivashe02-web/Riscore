<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinanceGuard Staff Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="{{ url_for('static', filename='js/vue3.js')}}"></script>
  <script src="{{ url_for('static', filename='js/chart.js')}}"></script>
  <script src="{{ url_for('static', filename='js/tailwind.js')}}"></script>
  <script src="{{ url_for('static', filename='js/axios.min.js')}}"></script>
  <!-- <script src="../static/js/tailwind.js"></script>
  <script src="../static/js/vue3.js"></script>
  <script src="../static/js/axios.min.js"></script>" -->
</head>
<body class="min-h-screen bg-neutral-50 flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md space-y-6 rounded-2xl border border-neutral-200 bg-white p-6 shadow-xl">
    <div>
      <h1 class="text-2xl font-semibold text-neutral-900">Team login</h1>
      <p class="text-sm text-neutral-500">Access the FinanceGuard dashboard.</p>
    </div>
    <form id="loginForm" class="space-y-4">
      <label class="block text-xs font-semibold uppercase tracking-wider text-neutral-500">
        Email
        <input name="email" type="email" required
               class="mt-2 w-full rounded-xl border border-neutral-200 px-4 py-3 text-sm outline-none focus:border-accent" />
      </label>
      <label class="block text-xs font-semibold uppercase tracking-wider text-neutral-500">
        Password
        <input name="password" type="password" required
               class="mt-2 w-full rounded-xl border border-neutral-200 px-4 py-3 text-sm outline-none focus:border-accent" />
      </label>
      <button
        type="submit"
        class="w-full rounded-xl bg-neutral-900 px-4 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-neutral-800"
      >
        Login
      </button>
    </form>
    <p id="loginMessage" class="text-sm text-center text-red-500"></p>
    <p class="text-xs text-center text-neutral-500">New here? <a href="/signup" class="font-semibold text-accent">Create an account</a></p>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('loginMessage');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';
      const payload = {
        email: form.email.value.trim(),
        password: form.password.value
      };
      try {
        const { data } = await axios.post('/api/login', payload);
        console.log(data);
        localStorage.setItem('financeguard_user', JSON.stringify(data.user));
        localStorage.setItem('financeguard_token', data.token);
        message.textContent = `Welcome back, ${data.user.full_name}!`;
        message.classList.remove('text-red-500');
        message.classList.add('text-emerald-600');
        window.location = "/dashboard"
      } catch (err) {
        message.textContent = err?.response?.data?.error || 'Unable to sign in.';
        message.classList.remove('text-emerald-600');
        message.classList.add('text-red-500');
      }
    });
  </script>
</body>
</html>
